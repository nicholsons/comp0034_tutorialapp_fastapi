name: Tests - backend and frontend

on:
  push:
    branches: [ "week9" ]
  pull_request:
    branches: [ "week9" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        pip install -e .
    - name: Lint with ruff
      run: |
       ruff check src
    - name: Test with pytest
      run: |
        pytest
